<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phone Party - Sync Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .controls {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .control-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        .control-group label {
            font-weight: 600;
            color: #333;
        }

        .control-group input,
        .control-group select,
        .control-group button {
            padding: 10px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
        }

        .control-group button {
            background: #667eea;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.3s;
        }

        .control-group button:hover {
            background: #5568d3;
        }

        .control-group button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .stat-card h3 {
            color: #555;
            font-size: 14px;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-card .value {
            font-size: 2em;
            font-weight: bold;
            color: #333;
        }

        .stat-card .unit {
            font-size: 0.8em;
            color: #888;
            margin-left: 5px;
        }

        .stat-card .status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-top: 8px;
        }

        .status.excellent { background: #10b981; color: white; }
        .status.good { background: #84cc16; color: white; }
        .status.medium { background: #f59e0b; color: white; }
        .status.poor { background: #ef4444; color: white; }

        .clients-section {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .clients-section h2 {
            color: #333;
            margin-bottom: 20px;
        }

        .client-list {
            display: grid;
            gap: 15px;
        }

        .client-card {
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 15px;
            transition: border-color 0.3s;
        }

        .client-card:hover {
            border-color: #667eea;
        }

        .client-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .client-id {
            font-weight: 600;
            color: #333;
        }

        .client-metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 10px;
        }

        .metric {
            padding: 8px;
            background: #f9fafb;
            border-radius: 6px;
        }

        .metric-label {
            font-size: 11px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .metric-value {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-top: 4px;
        }

        .chart-container {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .chart-container h2 {
            color: #333;
            margin-bottom: 15px;
        }

        canvas {
            max-width: 100%;
            height: 300px;
        }

        .log-section {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            max-height: 400px;
            overflow-y: auto;
        }

        .log-section h2 {
            color: #333;
            margin-bottom: 15px;
            position: sticky;
            top: 0;
            background: white;
            padding-bottom: 10px;
        }

        .log-entry {
            padding: 8px 12px;
            margin-bottom: 8px;
            border-left: 3px solid #667eea;
            background: #f9fafb;
            font-family: 'Courier New', monospace;
            font-size: 12px;
        }

        .log-entry.error {
            border-left-color: #ef4444;
            background: #fee2e2;
        }

        .log-entry.warning {
            border-left-color: #f59e0b;
            background: #fef3c7;
        }

        .log-timestamp {
            color: #888;
            margin-right: 10px;
        }

        .connection-status {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
        }

        .connection-status.connected {
            background: #10b981;
            box-shadow: 0 0 8px rgba(16, 185, 129, 0.6);
        }

        .connection-status.disconnected {
            background: #ef4444;
        }

        .test-controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
            margin-top: 20px;
        }

        .test-button {
            padding: 12px;
            background: #f59e0b;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.3s;
        }

        .test-button:hover {
            background: #d97706;
        }

        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            .client-metrics {
                grid-template-columns: 1fr 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎵 Phone Party - Sync Dashboard</h1>

        <!-- Connection Controls -->
        <div class="controls">
            <div class="control-group">
                <label>
                    <span class="connection-status disconnected" id="connectionStatus"></span>
                    Server:
                </label>
                <input type="text" id="serverUrl" value="ws://localhost:8080" placeholder="ws://localhost:8080">
                <label>Party Code:</label>
                <input type="text" id="partyCode" placeholder="Enter party code" maxlength="6">
                <button id="connectBtn" onclick="connectToParty()">Connect</button>
                <button id="disconnectBtn" onclick="disconnect()" disabled>Disconnect</button>
            </div>
        </div>

        <!-- Overall Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <h3>Total Clients</h3>
                <div class="value" id="totalClients">0</div>
            </div>
            <div class="stat-card">
                <h3>Average Latency</h3>
                <div class="value" id="avgLatency">—<span class="unit">ms</span></div>
            </div>
            <div class="stat-card">
                <h3>Average Drift</h3>
                <div class="value" id="avgDrift">—<span class="unit">ms</span></div>
            </div>
            <div class="stat-card">
                <h3>Network Health</h3>
                <div class="value" id="networkHealth">—</div>
                <span class="status excellent" id="healthStatus">Excellent</span>
            </div>
        </div>

        <!-- Network Jitter Simulation -->
        <div class="controls">
            <h3 style="margin-bottom: 15px; color: #333;">🌊 Network Jitter Simulation</h3>
            <div class="control-group">
                <label>Enable Jitter:</label>
                <input type="checkbox" id="jitterEnabled">
                <label>Jitter Amount:</label>
                <select id="jitterAmount">
                    <option value="low">Low (±10ms)</option>
                    <option value="medium" selected>Medium (±50ms)</option>
                    <option value="high">High (±100ms)</option>
                    <option value="extreme">Extreme (±200ms)</option>
                </select>
                <label>Packet Loss:</label>
                <select id="packetLoss">
                    <option value="0">None</option>
                    <option value="5">5%</option>
                    <option value="10">10%</option>
                    <option value="20">20%</option>
                </select>
            </div>
            <div class="test-controls">
                <button class="test-button" onclick="simulateNetworkSpike()">Simulate Network Spike</button>
                <button class="test-button" onclick="simulateDisconnect()">Simulate Disconnect</button>
                <button class="test-button" onclick="resetNetworkSimulation()">Reset Network</button>
            </div>
        </div>

        <!-- Client List -->
        <div class="clients-section">
            <h2>Connected Clients</h2>
            <div class="client-list" id="clientList">
                <p style="color: #888; text-align: center;">No clients connected</p>
            </div>
        </div>

        <!-- Drift Chart -->
        <div class="chart-container">
            <h2>Drift Over Time</h2>
            <canvas id="driftChart"></canvas>
        </div>

        <!-- Event Log -->
        <div class="log-section">
            <h2>Event Log</h2>
            <div id="eventLog"></div>
        </div>
    </div>

    <script src="sync-client.js"></script>
    <script>
        let ws = null;
        let syncEngine = null;
        let driftHistory = [];
        let maxHistoryLength = 50;
        let updateInterval = null;

        // Network simulation state
        let jitterEnabled = false;
        let jitterAmountMs = 50;
        let packetLossRate = 0;

        function log(message, type = 'info') {
            const logDiv = document.getElementById('eventLog');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            
            const timestamp = new Date().toLocaleTimeString();
            entry.innerHTML = `<span class="log-timestamp">[${timestamp}]</span>${message}`;
            
            logDiv.insertBefore(entry, logDiv.firstChild);
            
            // Keep only last 100 entries
            while (logDiv.children.length > 100) {
                logDiv.removeChild(logDiv.lastChild);
            }
        }

        function connectToParty() {
            const serverUrl = document.getElementById('serverUrl').value;
            const partyCode = document.getElementById('partyCode').value;

            if (!partyCode) {
                alert('Please enter a party code');
                return;
            }

            log(`Connecting to ${serverUrl} for party ${partyCode}...`);

            // Create WebSocket connection
            ws = new WebSocket(serverUrl);

            ws.onopen = () => {
                log('WebSocket connected', 'info');
                document.getElementById('connectionStatus').className = 'connection-status connected';
                document.getElementById('connectBtn').disabled = true;
                document.getElementById('disconnectBtn').disabled = false;

                // Initialize sync engine
                syncEngine = new ClientSyncEngine();
                syncEngine.initialize(ws);

                // Join party
                ws.send(JSON.stringify({
                    t: 'JOIN',
                    code: partyCode,
                    userId: 'dashboard-' + Math.random().toString(36).substr(2, 9),
                    isGuest: true
                }));

                // Start periodic stats updates
                updateInterval = setInterval(updateStats, 1000);
            };

            ws.onmessage = (event) => {
                handleMessage(JSON.parse(event.data));
            };

            ws.onerror = (error) => {
                log('WebSocket error: ' + error, 'error');
            };

            ws.onclose = () => {
                log('WebSocket disconnected', 'warning');
                document.getElementById('connectionStatus').className = 'connection-status disconnected';
                document.getElementById('connectBtn').disabled = false;
                document.getElementById('disconnectBtn').disabled = true;
                
                if (updateInterval) {
                    clearInterval(updateInterval);
                    updateInterval = null;
                }
            };
        }

        function disconnect() {
            if (ws) {
                ws.close();
                ws = null;
            }
            if (syncEngine) {
                syncEngine.destroy();
                syncEngine = null;
            }
        }

        function handleMessage(msg) {
            // Apply network simulation
            if (jitterEnabled && Math.random() * 100 < packetLossRate) {
                log(`[Simulation] Dropped packet: ${msg.t}`, 'warning');
                return;
            }

            if (jitterEnabled) {
                const delay = Math.random() * jitterAmountMs * 2 - jitterAmountMs;
                setTimeout(() => processMessage(msg), Math.max(0, delay));
            } else {
                processMessage(msg);
            }
        }

        function processMessage(msg) {
            switch (msg.t) {
                case 'JOINED':
                    log(`Joined party successfully`);
                    break;
                
                case 'TIME_PONG':
                case 'CLOCK_PONG':
                    if (syncEngine) {
                        syncEngine.handleClockPong(msg);
                    }
                    break;

                case 'DRIFT_CORRECTION':
                    if (syncEngine) {
                        syncEngine.handleDriftCorrection(msg);
                        recordDrift(msg.drift);
                        log(`Drift correction: ${msg.drift.toFixed(2)}ms, Rate: ${msg.playbackRate.toFixed(3)}x`);
                    }
                    break;

                case 'SYNC_STATS':
                    updateClientStats(msg.stats);
                    break;

                case 'PLAY_TRACK':
                    log(`Track started: ${msg.trackId || 'Unknown'}`);
                    break;

                default:
                    log(`Received: ${msg.t}`);
            }
        }

        function updateStats() {
            if (!syncEngine) return;

            const quality = syncEngine.getSyncQuality();
            
            document.getElementById('avgLatency').innerHTML = 
                `${quality.latency.toFixed(1)}<span class="unit">ms</span>`;
            
            const healthStatus = document.getElementById('healthStatus');
            healthStatus.textContent = quality.quality;
            healthStatus.className = `status ${quality.quality.toLowerCase()}`;

            // Request stats from server
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ t: 'GET_SYNC_STATS' }));
            }
        }

        function updateClientStats(stats) {
            if (!stats || !stats.clients) return;

            document.getElementById('totalClients').textContent = stats.totalClients || 0;

            // Calculate averages
            if (stats.clients.length > 0) {
                const avgLatency = stats.clients.reduce((sum, c) => sum + (c.latency || 0), 0) / stats.clients.length;
                const avgDrift = stats.clients.reduce((sum, c) => sum + Math.abs(c.lastDrift || 0), 0) / stats.clients.length;
                const avgStability = stats.clients.reduce((sum, c) => sum + (c.networkStability || 0), 0) / stats.clients.length;

                document.getElementById('avgDrift').innerHTML = 
                    `${avgDrift.toFixed(1)}<span class="unit">ms</span>`;
                document.getElementById('networkHealth').textContent = 
                    `${(avgStability * 100).toFixed(0)}%`;
            }

            // Update client list
            const clientList = document.getElementById('clientList');
            clientList.innerHTML = '';

            stats.clients.forEach(client => {
                const card = createClientCard(client);
                clientList.appendChild(card);
            });
        }

        function createClientCard(client) {
            const card = document.createElement('div');
            card.className = 'client-card';

            const qualityColor = client.latency < 50 ? 'excellent' : 
                                client.latency < 100 ? 'good' :
                                client.latency < 200 ? 'medium' : 'poor';

            card.innerHTML = `
                <div class="client-header">
                    <span class="client-id">${client.clientId || 'Unknown'}</span>
                    <span class="status ${qualityColor}">${qualityColor.toUpperCase()}</span>
                </div>
                <div class="client-metrics">
                    <div class="metric">
                        <div class="metric-label">Latency</div>
                        <div class="metric-value">${(client.latency || 0).toFixed(1)} ms</div>
                    </div>
                    <div class="metric">
                        <div class="metric-label">Drift</div>
                        <div class="metric-value">${(client.lastDrift || 0).toFixed(1)} ms</div>
                    </div>
                    <div class="metric">
                        <div class="metric-label">Playback Rate</div>
                        <div class="metric-value">${(client.playbackRate || 1.0).toFixed(3)}x</div>
                    </div>
                    <div class="metric">
                        <div class="metric-label">Stability</div>
                        <div class="metric-value">${((client.networkStability || 0) * 100).toFixed(0)}%</div>
                    </div>
                    <div class="metric">
                        <div class="metric-label">Position</div>
                        <div class="metric-value">${(client.playbackPosition || 0).toFixed(1)} s</div>
                    </div>
                    <div class="metric">
                        <div class="metric-label">Predicted Drift</div>
                        <div class="metric-value">${(client.predictedDrift || 0).toFixed(1)} ms</div>
                    </div>
                </div>
            `;

            return card;
        }

        function recordDrift(drift) {
            driftHistory.push({
                timestamp: Date.now(),
                drift: drift
            });

            if (driftHistory.length > maxHistoryLength) {
                driftHistory.shift();
            }

            updateDriftChart();
        }

        function updateDriftChart() {
            // Simple text-based visualization for now
            // In production, you'd use Chart.js or similar
            const canvas = document.getElementById('driftChart');
            const ctx = canvas.getContext('2d');
            
            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (driftHistory.length === 0) return;

            // Set canvas size
            canvas.width = canvas.offsetWidth;
            canvas.height = 300;

            // Draw axes
            ctx.strokeStyle = '#e0e0e0';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(50, 0);
            ctx.lineTo(50, canvas.height - 30);
            ctx.lineTo(canvas.width, canvas.height - 30);
            ctx.stroke();

            // Draw zero line
            ctx.strokeStyle = '#667eea';
            ctx.lineWidth = 1;
            ctx.setLineDash([5, 5]);
            ctx.beginPath();
            ctx.moveTo(50, canvas.height / 2);
            ctx.lineTo(canvas.width, canvas.height / 2);
            ctx.stroke();
            ctx.setLineDash([]);

            // Find min/max drift
            const drifts = driftHistory.map(d => d.drift);
            const maxDrift = Math.max(...drifts, 100);
            const minDrift = Math.min(...drifts, -100);
            const range = maxDrift - minDrift;

            // Draw drift line
            ctx.strokeStyle = '#10b981';
            ctx.lineWidth = 2;
            ctx.beginPath();

            driftHistory.forEach((point, index) => {
                const x = 50 + (index / (maxHistoryLength - 1)) * (canvas.width - 50);
                const y = canvas.height - 30 - ((point.drift - minDrift) / range) * (canvas.height - 30);
                
                if (index === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }
            });

            ctx.stroke();

            // Draw labels
            ctx.fillStyle = '#333';
            ctx.font = '12px Arial';
            ctx.fillText('0 ms', 10, canvas.height / 2);
            ctx.fillText(`${maxDrift.toFixed(0)} ms`, 10, 20);
            ctx.fillText(`${minDrift.toFixed(0)} ms`, 10, canvas.height - 35);
        }

        // Network simulation functions
        function simulateNetworkSpike() {
            log('Simulating network spike...', 'warning');
            const originalJitter = jitterAmountMs;
            jitterAmountMs = 200;
            jitterEnabled = true;

            setTimeout(() => {
                jitterAmountMs = originalJitter;
                jitterEnabled = document.getElementById('jitterEnabled').checked;
                log('Network spike ended');
            }, 5000);
        }

        function simulateDisconnect() {
            log('Simulating disconnect...', 'warning');
            if (ws) {
                ws.close();
                setTimeout(() => {
                    log('Reconnecting...');
                    connectToParty();
                }, 3000);
            }
        }

        function resetNetworkSimulation() {
            jitterEnabled = false;
            document.getElementById('jitterEnabled').checked = false;
            packetLossRate = 0;
            document.getElementById('packetLoss').value = '0';
            log('Network simulation reset');
        }

        // Event listeners
        document.getElementById('jitterEnabled').addEventListener('change', (e) => {
            jitterEnabled = e.target.checked;
            log(`Jitter ${jitterEnabled ? 'enabled' : 'disabled'}`);
        });

        document.getElementById('jitterAmount').addEventListener('change', (e) => {
            const amounts = { low: 10, medium: 50, high: 100, extreme: 200 };
            jitterAmountMs = amounts[e.target.value];
            log(`Jitter amount set to ±${jitterAmountMs}ms`);
        });

        document.getElementById('packetLoss').addEventListener('change', (e) => {
            packetLossRate = parseInt(e.target.value);
            log(`Packet loss rate set to ${packetLossRate}%`);
        });

        // Auto-connect if URL params present
        window.addEventListener('load', () => {
            const params = new URLSearchParams(window.location.search);
            const code = params.get('code');
            if (code) {
                document.getElementById('partyCode').value = code;
                connectToParty();
            }
        });
    </script>
</body>
</html>
