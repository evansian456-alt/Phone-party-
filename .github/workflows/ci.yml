name: CI

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  test:
    name: Lint, Build & Test
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      postgres:
        image: postgres:16
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: houseparty_test
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/houseparty_test
      JWT_SECRET: test-ci-secret-not-used-in-production
      REDIS_URL: redis://localhost:6379
      ALLOW_LOCAL_DISK_IN_PROD: "true"
      PUBLIC_BASE_URL: http://localhost:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build check (static – no compilation needed)
        run: npm run build

      - name: Apply database migrations
        run: npm run db:migrate

      - name: Create test storage directory
        run: mkdir -p test-storage-tmp

      - name: Run unit tests
        run: npm test -- --passWithNoTests --forceExit

      - name: Run performance smoke test
        run: npm run perf:smoke
        continue-on-error: true

      - name: Run integration tests
        run: npm run test:integration
        env:
          ADMIN_EMAILS: ianevans2023@outlook.com

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run e2e tests (tests/e2e)
        run: npm run test:e2e:new
        env:
          BASE_URL: http://localhost:8080
          ADMIN_EMAILS: ianevans2023@outlook.com
        continue-on-error: false

      - name: Upload e2e test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-tests
          path: playwright-report-tests/
          retention-days: 7

      - name: Run stress tests
        run: npm run test:stress
        env:
          STRESS_MAX_STAGE: "2"
        continue-on-error: true

      - name: Upload stress test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stress-test-reports
          path: tests/stress/reports/
          retention-days: 7

      - name: Run load tests (k6 — skipped if k6 not installed)
        run: npm run test:load
        continue-on-error: true
