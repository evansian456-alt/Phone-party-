name: Deploy to Cloud Run

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  SERVICE: syncspeaker

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Auth to Google (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          token_format: access_token
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Deploy to Cloud Run (build from source)
        # Note: secrets are automatically masked in GitHub Actions logs.
        # For higher security, consider migrating JWT_SECRET / DATABASE_URL / REDIS_URL
        # to Google Cloud Secret Manager and using --set-secrets instead of --set-env-vars.
        run: |
          gcloud run deploy "$SERVICE" \
            --source . \
            --region "${{ secrets.GCP_REGION }}" \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --allow-unauthenticated \
            --update-env-vars "NODE_ENV=production,DATABASE_URL=${{ secrets.DATABASE_URL }},REDIS_URL=${{ secrets.REDIS_URL }},PUBLIC_BASE_URL=${{ secrets.PUBLIC_BASE_URL }}" \
            --update-secrets JWT_SECRET=JWT_SECRET:latest
